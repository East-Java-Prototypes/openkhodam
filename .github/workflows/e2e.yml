name: Electron e2e

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Install dependencies
        run: nix develop -c pnpm install --frozen-lockfile

      - name: Run Electron e2e
        run: |
          nix develop -c xvfb-run -a --server-args='-screen 0 1280x720x24' bash -lc '
            recording=/tmp/openkhodam-e2e-run.mkv
            rm -f "$recording"
            ffmpeg -hide_banner -loglevel error -y -video_size 1280x720 -framerate 15 -f x11grab -i "${DISPLAY}.0" "$recording" &
            recorder=$!
            CI=1 ELECTRON_DISABLE_SANDBOX=1 pnpm test:e2e
            status=$?
            kill -TERM $recorder 2>/dev/null || true
            wait $recorder 2>/dev/null || true
            mkdir -p packages/e2e/test-results
            if [ -s "$recording" ]; then
              cp "$recording" packages/e2e/test-results/e2e-run.mkv
            fi
            exit $status
          '

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/e2e/playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: packages/e2e/test-results
          if-no-files-found: ignore
          retention-days: 7
