name: Electron e2e

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Install dependencies
        run: nix develop -c pnpm install --frozen-lockfile

      - name: Run Electron e2e
        run: nix develop -c xvfb-run -a env CI=1 ELECTRON_DISABLE_SANDBOX=1 pnpm test:e2e
